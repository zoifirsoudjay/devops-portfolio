<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zoifir SOUDJAY — Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 48px;
      max-width: 560px;
      width: 90%;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      margin: 0 auto 24px;
      color: white;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 8px;
    }

    .title {
      font-size: 1rem;
      color: #6366f1;
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-bottom: 32px;
    }

    .divider {
      border: none;
      border-top: 1px solid #2d3148;
      margin: 32px 0;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-github {
      background: #24292e;
      color: #fff;
      border: 1px solid #444d56;
    }

    .btn-linkedin {
      background: #0077b5;
      color: #fff;
    }

    .btn-cv {
      background: linear-gradient(135deg, #6366f1, #06b6d4);
      color: #fff;
    }

    .footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: #4a5568;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">ZS</div>
    <h1>Zoifir SOUDJAY</h1>
    <p class="title">Consultant DevOps Mainframe</p>

    <hr class="divider" />

    <div class="links">

        devops-portfolio

        <!-- LinkedIn icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>

        Télécharger mon CV

    </div>

    <p class="footer">Hébergé sur GitHub · Déployé via Terraform</p>
  </div>
</body>
</html>
